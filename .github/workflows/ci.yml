name: CI

on:
  push:
    branches:
      - main
  pull_request:

# cancel in-progress runs on new commits to same PR (gitub.event.number)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Use the pnpm pinned in package.json "packageManager" (pnpm@11.2.2) via corepack.
      # Enable corepack BEFORE setup-node so its `cache: pnpm` can find pnpm. corepack
      # enable only creates the shim (fine under the runner's Node 20); pnpm itself only
      # runs once Node 24 is on PATH, satisfying pnpm 11's engines.node >=22.13.
      # We don't use pnpm/action-setup: its self-installer runs under Node 20 and pnpm 11
      # rejects it. corepack@latest is installed first for up-to-date signing keys.
      - name: Enable pnpm (corepack)
        run: |
          npm install --global corepack@latest --force
          corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
